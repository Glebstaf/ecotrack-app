<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack | Эко-будущее</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --secondary: #3b82f6;
            --accent: #f59e0b;
            --danger: #ef4444;
            --bg-gradient: linear-gradient(135deg, #ecfdf5 0%, #dbeafe 50%, #fce7f3 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --text: #1f2937;
            --text-light: #6b7280;
            --border: rgba(255, 255, 255, 0.5);
            --shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1);
        }

        [data-theme="dark"] {
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e1b4b 50%, #312e81 100%);
            --card-bg: rgba(30, 41, 59, 0.85);
            --text: #f3f4f6;
            --text-light: #9ca3af;
            --border: rgba(255, 255, 255, 0.1);
            --shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Montserrat', sans-serif; transition: all 0.3s ease; }

        body {
            background: var(--bg-gradient);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            padding: 20px;
            color: var(--text);
        }

        @keyframes gradientBG { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }

        .container { max-width: 900px; margin: 0 auto; position: relative; z-index: 1; }

        /* Glassmorphism Cards */
        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            padding: 30px;
            margin-bottom: 25px;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 0 10px; }
        .logo { font-size: 2rem; font-weight: 800; background: linear-gradient(to right, #10b981, #3b82f6); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        
        .btn-icon {
            background: rgba(255,255,255,0.2); border: 1px solid var(--border);
            width: 45px; height: 45px; border-radius: 50%; cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center; color: var(--text);
        }
        .btn-icon:hover { background: rgba(255,255,255,0.5); transform: scale(1.1); }

        h2 { font-weight: 800; margin-bottom: 20px; font-size: 1.8rem; }
        h3 { font-weight: 700; margin: 25px 0 15px; font-size: 1.3rem; display: flex; align-items: center; gap: 10px; }

        input, select {
            width: 100%; padding: 15px; margin-bottom: 15px;
            background: rgba(255,255,255,0.5); border: 2px solid transparent;
            border-radius: 16px; font-size: 1rem; color: var(--text);
        }
        input:focus, select:focus { outline: none; border-color: var(--primary); background: #fff; }

        .btn {
            width: 100%; padding: 16px; border: none; border-radius: 16px;
            font-weight: 700; font-size: 1rem; cursor: pointer; color: white;
            background: linear-gradient(135deg, var(--primary), #059669);
            box-shadow: 0 10px 20px rgba(16, 185, 129, 0.3);
            margin-top: 10px;
        }
        .btn:hover { transform: translateY(-3px); box-shadow: 0 15px 25px rgba(16, 185, 129, 0.4); }
        .btn:active { transform: translateY(0); }
        .btn-secondary { background: linear-gradient(135deg, var(--secondary), #2563eb); box-shadow: 0 10px 20px rgba(59, 130, 246, 0.3); }
        .btn-accent { background: linear-gradient(135deg, var(--accent), #d97706); box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3); }
        .btn-outline { background: transparent; border: 2px solid var(--primary); color: var(--primary); box-shadow: none; }

        .stats-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-box {
            background: linear-gradient(135deg, rgba(255,255,255,0.6), rgba(255,255,255,0.2));
            padding: 20px; border-radius: 20px; text-align: center; border: 1px solid var(--border);
        }
        .stat-val { font-size: 2rem; font-weight: 800; color: var(--primary); display: block; }
        .stat-lbl { font-size: 0.8rem; font-weight: 600; color: var(--text-light); text-transform: uppercase; }

        .action-item, .task-item {
            display: flex; align-items: center; justify-content: space-between;
            padding: 18px; background: rgba(255,255,255,0.4); border-radius: 16px;
            margin-bottom: 12px; border: 1px solid var(--border);
        }
        .action-item:hover, .task-item:hover { transform: translateX(5px); background: rgba(255,255,255,0.7); }
        
        .task-badge { padding: 5px 12px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; }
        .diff-easy { background: #d1fae5; color: #065f46; }
        .diff-medium { background: #fef3c7; color: #92400e; }
        .diff-hard { background: #fee2e2; color: #991b1b; }

        .nav-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 30px; }

        /* Shop Items */
        .shop-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .shop-item {
            background: rgba(255,255,255,0.5); border-radius: 16px; padding: 20px; text-align: center;
            border: 2px solid transparent; cursor: pointer;
        }
        .shop-item:hover { border-color: var(--accent); transform: scale(1.05); }
        .shop-item.owned { border-color: var(--primary); background: rgba(16, 185, 129, 0.1); }
        .shop-icon { font-size: 3rem; margin-bottom: 10px; display: block; }
        .shop-price { font-weight: 800; color: var(--accent); margin-top: 5px; }

        /* Confetti */
        .confetti { position: fixed; width: 10px; height: 10px; background-color: #f00; animation: fall linear forwards; z-index: 9999; pointer-events: none; }
        @keyframes fall { to { transform: translateY(100vh) rotate(720deg); opacity: 0; } }

        .hidden { display: none !important; }
        .tip-box { background: linear-gradient(135deg, #ecfdf5, #d1fae5); padding: 15px; border-radius: 12px; margin-bottom: 20px; border-left: 4px solid var(--primary); }
        .tip-text { font-style: italic; color: #065f46; }
        
        @media (max-width: 600px) { .stats-grid, .nav-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="logo">🌱 EcoTrack</div>
            <div style="display:flex; gap:10px">
                <button class="btn-icon" onclick="toggleTheme()">🌓</button>
                <button class="btn-icon" onclick="logout()">🚪</button>
            </div>
        </div>

        <!-- Registration -->
        <div id="reg-screen" class="glass-card">
            <h2>👋 Регистрация</h2>
            <input type="text" id="first-name" placeholder="Имя">
            <input type="text" id="last-name" placeholder="Фамилия">
            <select id="role" onchange="toggleTeacherCode()">
                <option value="student">🎓 Ученик</option>
                <option value="teacher">👨‍ Учитель</option>
            </select>
            <input type="password" id="teacher-code" class="hidden" placeholder="🔑 Код учителя">
            <select id="school-type">
                <option value="Школа">🏫 Школа</option><option value="Лицей">🎓 Лицей</option>
                <option value="Гимназия">📚 Гимназия</option><option value="Колледж">🏛 Колледж</option>
            </select>
            <input type="text" id="school-num" placeholder="Номер школы">
            <input type="text" id="city" placeholder="Город">
            <input type="text" id="class" placeholder="Класс">
            <button class="btn" onclick="doRegister()">Начать путь 🚀</button>
        </div>

        <!-- Student Dashboard -->
        <div id="student-screen" class="hidden">
            <div class="glass-card" style="text-align:center">
                <div style="font-size:4rem; margin-bottom:-10px" id="user-avatar">🦸♂️</div>
                <h2 id="user-greeting" style="margin-bottom:5px"></h2>
                <p id="user-info" style="color:var(--text-light); font-weight:600"></p>
                <div id="user-title" style="color:var(--accent); font-weight:800; margin-top:5px; font-size:0.9rem"></div>
            </div>

            <div class="glass-card">
                <div id="daily-tip" class="tip-box hidden">
                    <strong>💡 Совет дня:</strong> <span class="tip-text" id="tip-content"></span>
                </div>
                <div class="stats-grid">
                    <div class="stat-box"><span class="stat-val" id="points">0</span><span class="stat-lbl">Очки</span></div>
                    <div class="stat-box"><span class="stat-val" id="streak">0</span><span class="stat-lbl">Серия</span></div>
                    <div class="stat-box"><span class="stat-val" id="level">Новичок</span><span class="stat-lbl">Уровень</span></div>
                </div>
            </div>

            <div class="glass-card">
                <h3>📝 Действия</h3>
                <div id="actions"></div>
                <button class="btn" onclick="saveDay()">Сохранить день 💾</button>
            </div>

            <div class="glass-card">
                <h3>📋 Задания</h3>
                <div id="tasks-list"></div>
            </div>

            <div class="nav-grid">
                <button class="btn btn-secondary" onclick="showStats()">📊 Статистика</button>
                <button class="btn" onclick="showShop()">🛒 Магазин</button>
                <button class="btn btn-accent" onclick="showAchievements()">🏅 Достижения</button>
                <button class="btn btn-outline" onclick="showLeaders()">🥇 Топ школы</button>
            </div>
        </div>

        <!-- Teacher Dashboard -->
        <div id="teacher-screen" class="hidden">
            <div class="glass-card">
                <h2>👨‍🏫 Панель учителя</h2>
                <div id="teacher-info" style="text-align:center; margin-bottom:20px; color:var(--text-light)"></div>
                <div class="stats-grid">
                    <div class="stat-box"><span class="stat-val" id="total-students">0</span><span class="stat-lbl">Учеников</span></div>
                    <div class="stat-box"><span class="stat-val" id="class-avg">0</span><span class="stat-lbl">Ср. баллов</span></div>
                    <div class="stat-box"><span class="stat-val" id="top-score">0</span><span class="stat-lbl">Максимум</span></div>
                </div>
                <div id="teacher-content"></div>
            </div>
        </div>

        <!-- Other Screens -->
        <div id="stats-screen" class="glass-card hidden"><h2>📊 Статистика</h2><canvas id="chart" style="max-height:300px"></canvas><button class="btn" onclick="showStudentScreen()">← Назад</button></div>
        <div id="achievements-screen" class="glass-card hidden"><h2>🏅 Достижения</h2><div id="badges-list" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(100px,1fr)); gap:15px"></div><button class="btn" onclick="showStudentScreen()">← Назад</button></div>
        <div id="shop-screen" class="glass-card hidden">
            <h2>🛒 Магазин наград</h2>
            <p style="color:var(--text-light); margin-bottom:20px">Трать очки на уникальные предметы!</p>
            <div id="shop-list" class="shop-grid"></div>
            <button class="btn" onclick="showStudentScreen()">← Назад</button>
        </div>
        <div id="leaders-screen" class="glass-card hidden"><h2>🥇 Топ школы</h2><div id="leaders-list"></div><button class="btn" onclick="showStudentScreen()">← Назад</button></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
