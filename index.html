<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: Arial, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .card { background: white; padding: 30px; border-radius: 15px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        h1 { color: #10b981; text-align: center; margin-bottom: 10px; }
        h2 { margin-bottom: 20px; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 8px; }
        .btn { width: 100%; padding: 12px; background: #10b981; color: white; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; margin-top: 10px; }
        .btn:hover { background: #059669; }
        .hidden { display: none; }
        .stat { display: inline-block; width: 30%; text-align: center; padding: 15px; background: #ecfdf5; border-radius: 8px; margin: 1%; }
        .stat-val { font-size: 24px; font-weight: bold; color: #10b981; }
        .action-item { padding: 12px; background: #f3f4f6; margin: 8px 0; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .leader-item { padding: 12px; border-bottom: 1px solid #eee; }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🌱 EcoTrack</h1>
            <p style="text-align:center;color:#666">Твой эко-помощник</p>
        </div>

        <div id="reg-screen" class="card">
            <h2>Регистрация</h2>
            <input type="text" id="name" placeholder="Имя">
            <select id="school-type">
                <option value="Школа">Школа</option>
                <option value="Лицей">Лицей</option>
                <option value="Гимназия">Гимназия</option>
            </select>
            <input type="text" id="school-num" placeholder="Номер">
            <input type="text" id="city" placeholder="Город">
            <input type="text" id="class" placeholder="Класс">
            <button class="btn" onclick="doRegister()">Начать 🚀</button>
        </div>

        <div id="main-screen" class="card hidden">
            <h2>Привет, <span id="user-name"></span>!</h2>
            <p id="user-info" style="color:#666;text-align:center"></p>
            <div style="text-align:center">
                <div class="stat"><div class="stat-val" id="points">0</div><div>Очков</div></div>
                <div class="stat"><div class="stat-val" id="streak">0</div><div>Дней</div></div>
                <div class="stat"><div class="stat-val" id="level">Новичок</div><div>Уровень</div></div>
            </div>
            <h3 style="margin:20px 0 10px">Действия:</h3>
            <div id="actions"></div>
            <button class="btn" onclick="saveDay()">Сохранить 💾</button>
            <div class="nav" style="margin-top:20px">
                <button class="btn" style="background:#3b82f6" onclick="showStats()">📊 Статистика</button>
                <button class="btn" style="background:#f59e0b" onclick="showLeaders()">🏆 Топ</button>
            </div>
        </div>

        <div id="stats-screen" class="card hidden">
            <h2>Статистика</h2>
            <canvas id="chart" height="200"></canvas>
            <button class="btn" onclick="showMain()">← Назад</button>
        </div>

        <div id="leaders-screen" class="card hidden">
            <h2>Топ участников</h2>
            <div id="leaders-list">Загрузка...</div>
            <button class="btn" onclick="showMain()">← Назад</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
