<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoTrack</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #10b981; --bg: #f0fdf4; --card: #ffffff; --text: #1f2937; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); min-height: 100vh; padding: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        header { text-align: center; margin-bottom: 30px; }
        header h1 { color: var(--primary); font-size: 2rem; }
        .card { background: var(--card); padding: 30px; border-radius: 16px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .hidden { display: none; }
        h2 { margin-bottom: 20px; text-align: center; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #e5e7eb; border-radius: 8px; font-size: 1rem; }
        .btn { width: 100%; padding: 12px; background: var(--primary); color: white; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; font-weight: 600; }
        .btn:hover { background: #059669; }
        .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 20px; }
        .stat-box { background: #ecfdf5; padding: 15px; border-radius: 8px; text-align: center; }
        .stat-val { font-size: 1.5rem; font-weight: bold; color: var(--primary); }
        .nav { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-secondary { background: #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌱 EcoTrack</h1>
            <p>Твой помощник в защите природы</p>
        </header>

        <section id="screen-register" class="card">
            <h2>Регистрация</h2>
            <form id="reg-form">
                <input type="text" id="inp-name" placeholder="Твое имя" required>
                <select id="inp-school-type">
                    <option value="Школа">Школа</option>
                    <option value="Лицей">Лицей</option>
                    <option value="Гимназия">Гимназия</option>
                </select>
                <input type="text" id="inp-school-num" placeholder="Номер школы" required>
                <input type="text" id="inp-city" placeholder="Город" required>
                <input type="text" id="inp-class" placeholder="Класс" required>
                <button type="submit" class="btn">Начать 🚀</button>
            </form>
        </section>

        <section id="screen-dashboard" class="card hidden">
            <h2>Привет, <span id="dash-name"></span>!</h2>
            <p id="dash-info" style="text-align:center;color:#666;margin-bottom:20px;"></p>
            <div class="stats">
                <div class="stat-box"><div class="stat-val" id="stat-points">0</div><div>Очков</div></div>
                <div class="stat-box"><div class="stat-val" id="stat-streak">0</div><div>Дней</div></div>
                <div class="stat-box"><div class="stat-val" id="stat-level">Новичок</div><div>Уровень</div></div>
            </div>
            <div id="list-actions"></div>
            <button id="btn-save" class="btn" style="margin-top:15px;">Сохранить 💾</button>
            <div class="nav">
                <button onclick="ui.show('stats')" class="btn btn-secondary">📊 Статистика</button>
                <button onclick="ui.show('leaders')" class="btn btn-secondary">🏆 Топ</button>
            </div>
        </section>

        <section id="screen-stats" class="card hidden">
            <h2>Статистика</h2>
            <canvas id="chart" style="max-height:200px"></canvas>
            <button onclick="ui.show('dashboard')" class="btn" style="margin-top:15px;">← Назад</button>
        </section>

        <section id="screen-leaders" class="card hidden">
            <h2>Топ участников</h2>
            <div id="list-leaders">Загрузка...</div>
            <button onclick="ui.show('dashboard')" class="btn" style="margin-top:15px;">← Назад</button>
        </section>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
